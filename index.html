<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICAO 航空字母与数字发音</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
      min-height: 100vh;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 30px 20px;
    }

    #app {
      max-width: 900px;
      margin: 0 auto;
    }

    .top-bar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      margin-bottom: 6px;
    }

    .mode-toggle {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      color: #8ab4f8;
      transition: background 0.2s;
      line-height: 1;
      font-family: inherit;
    }

    .mode-toggle:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .mode-toggle span {
      opacity: 0.35;
      transition: opacity 0.2s;
    }

    .mode-toggle span.active {
      opacity: 1;
      color: #fff;
    }

    .mode-toggle .sep {
      opacity: 0.2;
      color: #666;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #8ab4f8;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      transition: background 0.3s;
      display: inline-block;
    }

    .status-dot.on {
      background: #2196f3;
      box-shadow: 0 0 6px #2196f3;
    }

    .status-dot.off {
      background: #f44336;
      box-shadow: 0 0 6px #f44336;
    }

    .status-dot.local {
      background: #4caf50;
      box-shadow: 0 0 6px #4caf50;
    }

    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 99;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      color: #8ab4f8;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 20px;
      margin: 30px 0 16px 12px;
      color: #8ab4f8;
      border-left: 4px solid #4a90d9;
      padding-left: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: #4a90d9;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(74, 144, 217, 0.2);
    }

    .card:active {
      transform: scale(0.95);
    }

    .card .char {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
    }

    .card .phonetic {
      font-size: 12px;
      color: #8ab4f8;
      font-family: "Times New Roman", serif;
    }

    .card .word {
      font-size: 14px;
      color: #a0c4ff;
      font-weight: 500;
    }

    .mode-tip {
      text-align: center;
      font-size: 12px;
      color: #667;
      margin-top: 30px;
    }

    @media (max-width: 480px) {
      body {
        padding: 20px 12px;
      }

      .card {
        padding: 12px 6px;
      }

      .card .char {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <div id="toast"></div>

  <div class="top-bar">
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">本地音源 · 已就绪</span>
    </div>
    <button class="mode-toggle" id="modeToggle">
      <span class="active">本地</span>
      <span class="sep">/</span>
      <span>API</span>
    </button>
  </div>

  <h1>民航陆空通话发音</h1>
  <p class="subtitle">ICAO 标准字母与数字拼读 — 点击卡片试听</p>

  <div class="section-title">数字 0 – 9</div>
  <div class="grid" id="digitsGrid"></div>

  <div class="section-title">字母 A – Z</div>
  <div class="grid" id="lettersGrid"></div>

  <div class="mode-tip">WYD·ZSNB @2026</div>

      { char: 'O', word: 'Oscar', phonetic: 'OSS-kah' },
      { char: 'P', word: 'Papa', phonetic: 'pah-PAH' },
      { char: 'Q', word: 'Quebec', phonetic: 'keh-BECK' },
      { char: 'R', word: 'Romeo', phonetic: 'ROW-me-oh' },

      { char: 'W', word: 'Whiskey', phonetic: 'WISS-key' },
      { char: 'X', word: 'X-ray', phonetic: 'ECKS-ray' },
      { char: 'Y', word: 'Yankee', phonetic: 'YANG-key' },
      { char: 'Z', word: 'Zulu', phonetic: 'ZOO-loo' },
    ]

    const wordToChar = Object.fromEntries(letters.map(l => [l.word, l.char]))
    let useLocal = true

    const statusDot = document.getElementById('statusDot')
    const statusText = document.getElementById('statusText')
    const modeToggle = document.getElementById('modeToggle')
    const toastEl = document.getElementById('toast')

    function renderGrid(container, data) {
      container.innerHTML = data.map(item =>
        `<div class="card" data-word="${item.word}">
      <div class="char">${item.char}</div>
      <div class="word">${item.word}</div>
      <div class="phonetic">${item.phonetic}</div>
    </div>`
      ).join('')
    }

    renderGrid(document.getElementById('digitsGrid'), digits)
    renderGrid(document.getElementById('lettersGrid'), letters)

    function setStatus(cls, text) {
      statusDot.className = 'status-dot ' + cls
      statusText.textContent = text
    }

    function toggleMode() {
      useLocal = !useLocal
      const spans = modeToggle.querySelectorAll('span:not(.sep)')
      spans.forEach(s => s.classList.toggle('active'))
      if (useLocal) {
        setStatus('local', '本地音源 · 已就绪')
      } else {
        setStatus('on', '在线音源 · 已就绪')
      }
    }

    function toast(msg) {
      toastEl.textContent = msg
      toastEl.className = 'show'
      clearTimeout(window._toast)
      window._toast = setTimeout(() => toastEl.className = '', 2000)
    }

    function playLocal(text) {
      const char = wordToChar[text]
      if (!char) return Promise.reject('no local file')
      return new Promise((resolve, reject) => {
        const tryBase64 = () => {
          const data = AUDIO_DATA[char]
          if (!data) return reject('no base64 data')
          const audio = new Audio(data)
          audio.addEventListener('ended', resolve, { once: true })
          audio.addEventListener('error', reject, { once: true })
          audio.play().catch(reject)
        }
        const audio = new Audio('phonetics/' + char + '.mp3')
        audio.addEventListener('ended', resolve, { once: true })
        audio.addEventListener('error', tryBase64, { once: true })
        audio.play().catch(tryBase64)
      })
    }

    function playOnline(text) {
      return new Promise((resolve, reject) => {
        const url = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2'
        const audio = new Audio(url)
        audio.addEventListener('canplaythrough', () => resolve(audio), { once: true })
        audio.addEventListener('error', reject, { once: true })
        audio.play().catch(reject)
      })
    }

    function speak(text) {
      if (useLocal) {
        playLocal(text).catch(() => playOnline(text)).catch(() => toast('发音失败'))
      } else {
        playOnline(text).catch(() => toast('发音失败'))
      }
    }

    document.addEventListener('click', function (e) {
      const card = e.target.closest('.card')
      if (card) {
        speak(card.dataset.word)
        return
      }
      if (e.target.closest('#modeToggle')) {
        toggleMode()
        return
      }
    })
  </script>
